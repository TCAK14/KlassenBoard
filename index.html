<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KlassenBoard – Das digitale Klassenzimmer</title>
<meta name="description" content="KlassenBoard ist das smarte digitale Klassenzimmer für Lehrerinnen und Lehrer. Widgets, KI-Assistent, Live-Umfragen, Sprachsteuerung und mehr.">
<meta name="theme-color" content="#6366f1">
<meta property="og:title" content="KlassenBoard">
<meta property="og:description" content="Das smarte digitale Klassenzimmer für Lehrerinnen und Lehrer">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
<style>
:root {
  --brand: #6366f1;
  --brand-dark: #4f46e5;
  --toolbar-h: 56px;
  --glass: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.12);
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --radius: 16px;
  --radius-sm: 10px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }
body { background:#1e293b; color:#fff; touch-action:none; }
/* Inputs/Textareas müssen immer tippbar sein – touch-action:none auf body überschreiben */
input, textarea, select, [contenteditable] { touch-action:auto; user-select:text; -webkit-user-select:text; }
.modal, .modal * { touch-action:auto; }
.tab-input { touch-action:auto; user-select:text; -webkit-user-select:text; }

/* ── Klassen-Wechsler ── */
#class-switcher {
  position:relative; flex-shrink:0;
}
#class-btn {
  display:flex; align-items:center; gap:5px;
  padding:5px 10px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15);
  color:#fff; cursor:pointer; font-size:13px; font-weight:600;
  transition:all .15s; white-space:nowrap; max-width:130px;
}
#class-btn:hover { background:rgba(255,255,255,0.18); }
#class-btn .class-name { overflow:hidden; text-overflow:ellipsis; max-width:90px; }
#class-dropdown {
  position:absolute; top:calc(100% + 8px); left:0;
  min-width:220px; background:rgba(15,15,25,0.97);
  backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.12);
  border-radius:12px; box-shadow:0 16px 48px rgba(0,0,0,0.6);
  z-index:2000; display:none; overflow:hidden;
}
#class-dropdown.open { display:block; }
.class-dd-header {
  padding:10px 12px 6px; font-size:10.5px;
  color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:.8px;
}
.class-dd-item {
  display:flex; align-items:center; gap:8px;
  padding:9px 12px; cursor:pointer; transition:background .1s;
  font-size:13px;
}
.class-dd-item:hover { background:rgba(255,255,255,0.07); }
.class-dd-item.active { background:rgba(99,102,241,0.2); color:#a5b4fc; }
.class-dd-item .class-dd-name { flex:1; font-weight:500; }
.class-dd-item .class-dd-count { font-size:10.5px; color:rgba(255,255,255,0.3); }
.class-dd-item .class-dd-del {
  opacity:0; font-size:11px; padding:2px 5px; border-radius:4px;
  border:none; background:transparent; color:rgba(255,255,255,0.4); cursor:pointer;
  transition:opacity .15s;
}
.class-dd-item:hover .class-dd-del { opacity:1; }
.class-dd-item .class-dd-del:hover { background:rgba(239,68,68,0.2); color:#fca5a5; }
.class-dd-divider { height:1px; background:rgba(255,255,255,0.07); margin:4px 0; }
.class-dd-add {
  display:flex; align-items:center; gap:8px;
  padding:8px 12px 10px; cursor:pointer;
  font-size:12.5px; color:rgba(255,255,255,0.45);
  transition:color .15s;
}
.class-dd-add:hover { color:#fff; }
.class-dd-add-input {
  display:none; padding:6px 12px 10px; gap:6px; flex-direction:column;
}
.class-dd-add-input.visible { display:flex; }
.class-dd-add-input input {
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
  border-radius:7px; color:#fff; font-size:12.5px; padding:7px 10px;
  touch-action:auto; outline:none;
}
.class-dd-add-input input:focus { border-color:rgba(99,102,241,0.6); }
.class-dd-add-input button {
  padding:6px 12px; border-radius:7px; border:none; cursor:pointer;
  background:var(--brand); color:#fff; font-size:12px; font-weight:600;
}

/* ── Toolbar ── */
#toolbar {
  position:fixed; top:0; left:0; right:0; height:var(--toolbar-h);
  background:rgba(0,0,0,0.4); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--glass-border);
  display:flex; align-items:center; gap:8px; padding:0 12px;
  z-index:99999 !important; user-select:none;
  pointer-events:all !important;
}
#logo { display:flex; align-items:center; gap:6px; margin-right:8px; flex-shrink:0; }
#logo span:first-child { font-size:22px; }
#logo-text { font-weight:700; font-size:15px; letter-spacing:-0.3px; }
#board-tabs { display:flex; align-items:center; gap:4px; flex:1; min-width:0; overflow-x:auto; scrollbar-width:none; }
#board-tabs::-webkit-scrollbar { display:none; }
.tab-btn {
  flex-shrink:0; padding:6px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:500;
  border:none; cursor:pointer; transition:all .15s; white-space:nowrap;
  background:transparent; color:rgba(255,255,255,0.5);
}
.tab-btn:hover { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.85); }
.tab-btn.active { background:rgba(255,255,255,0.18); color:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.3); }
.tab-btn { display:flex; align-items:center; gap:5px; }
.tab-name-span { pointer-events:none; }
.tab-action {
  font-size:11px; opacity:0; border-radius:3px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:opacity .15s, background .15s; line-height:1;
  padding:1px 2px; cursor:pointer;
}
.tab-btn:hover .tab-action { opacity:0.6; }
.tab-btn:hover .tab-action:hover { opacity:1; background:rgba(255,255,255,0.2); }
.tab-edit { font-size:10px; }
.tab-close { font-size:11px; margin-left:1px; }
.tab-input { background:transparent; border:none; outline:none; color:#fff; font:inherit; width:100px; }
#add-board-btn {
  flex-shrink:0; width:28px; height:28px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.1); border:none; color:rgba(255,255,255,0.6);
  cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
#add-board-btn:hover { background:rgba(255,255,255,0.2); color:#fff; }
.toolbar-sep { width:1px; height:28px; background:rgba(255,255,255,0.1); flex-shrink:0; }
.tb-btn {
  flex-shrink:0; border:none; cursor:pointer; border-radius:var(--radius-sm);
  padding:6px 10px; font-size:13px; font-weight:500; transition:all .15s;
  display:flex; align-items:center; gap:5px; white-space:nowrap;
}
.tb-btn:active { transform:scale(0.95); }
#btn-ai-board { background:linear-gradient(135deg,#7c3aed,#6366f1); color:#fff; }
#btn-ai-board:hover { background:linear-gradient(135deg,#6d28d9,#4f46e5); }
#btn-add-widget { background:var(--brand); color:#fff; }
#btn-add-widget:hover { background:var(--brand-dark); }

/* ── KI-Board Generator Modal ── */
.ai-board-modal { max-width:480px; }
.ai-board-modal h2 { font-size:18px; margin-bottom:4px; }
.ai-board-modal .subtitle { font-size:12.5px; color:rgba(255,255,255,0.45); margin-bottom:16px; }
.ai-board-row { display:flex; gap:10px; }
.ai-board-row .form-group { flex:1; }
.ai-board-gen-btn {
  width:100%; padding:12px; border-radius:10px; border:none;
  background:linear-gradient(135deg,#7c3aed,#6366f1); color:#fff;
  font-size:14px; font-weight:700; cursor:pointer; margin-top:8px;
  transition:all .2s; letter-spacing:.3px;
}
.ai-board-gen-btn:hover { background:linear-gradient(135deg,#6d28d9,#4f46e5); transform:translateY(-1px); }
.ai-board-gen-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.ai-board-progress {
  margin-top:14px; padding:12px; border-radius:10px;
  background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.2);
  font-size:12.5px; color:rgba(255,255,255,0.6); text-align:center; display:none;
}
.ai-board-progress.visible { display:block; }
.tb-icon-btn {
  flex-shrink:0; width:34px; height:34px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.08); border:none; color:rgba(255,255,255,0.7);
  cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.tb-icon-btn:hover { background:rgba(255,255,255,0.18); color:#fff; }
.tb-icon-btn.active { background:rgba(253,224,71,0.25); color:#fde047; }
#edit-mode-btn { padding:6px 10px; width:auto; font-size:12px; font-weight:600; letter-spacing:.3px; }

/* ── Board Canvas ── */
#board {
  position:fixed; top:var(--toolbar-h); left:0; right:0; bottom:0;
  overflow:hidden; background:#1e293b;
}
#board-bg {
  position:absolute; inset:0;
  background:linear-gradient(135deg,#667eea,#764ba2);
  transition:background .3s;
}
#widgets-layer { position:absolute; inset:0; }

/* ── Widget Shell ── */
.widget {
  position:absolute; border-radius:var(--radius);
  background:var(--glass); backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  box-shadow:var(--shadow);
  overflow:hidden; user-select:none;
  transition:box-shadow .15s;
  min-width:120px; min-height:80px;
}
.widget.selected { border-color:rgba(99,102,241,0.8); box-shadow:0 0 0 2px rgba(99,102,241,0.4), var(--shadow); }
.widget-header {
  position:absolute; top:0; left:0; right:0; height:32px;
  background:rgba(0,0,0,0.2);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 8px; cursor:grab; z-index:2;
  opacity:0; transition:opacity .15s;
}
.widget:hover .widget-header, .widget.selected .widget-header { opacity:1; }
.widget-header:active { cursor:grabbing; }
.widget-title { font-size:11px; color:rgba(255,255,255,0.6); font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
.widget-actions { display:flex; gap:4px; }
.w-btn {
  width:22px; height:22px; border-radius:6px; border:none; cursor:pointer;
  font-size:12px; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.7);
  transition:all .1s;
}
.w-btn:hover { background:rgba(255,255,255,0.25); color:#fff; }
.w-btn.del:hover { background:rgba(239,68,68,0.4); color:#fca5a5; }
.widget-body {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
}
.widget-body.with-header { top:32px; }
.resize-handle {
  position:absolute; right:0; bottom:0; width:20px; height:20px;
  cursor:se-resize; opacity:0; transition:opacity .15s; z-index:3;
}
.resize-handle::after {
  content:''; position:absolute; right:4px; bottom:4px;
  width:10px; height:10px;
  border-right:2px solid rgba(255,255,255,0.5);
  border-bottom:2px solid rgba(255,255,255,0.5);
  border-radius:0 0 3px 0;
}
.widget:hover .resize-handle { opacity:1; }

/* ── Modal ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
  z-index:2000; display:flex; align-items:center; justify-content:center;
  animation:fadeIn .15s;
}
.modal {
  background:#1e293b; border:1px solid var(--glass-border); border-radius:20px;
  box-shadow:0 24px 64px rgba(0,0,0,0.5); padding:24px;
  width:min(520px,95vw); max-height:85vh; overflow-y:auto;
  animation:slideUp .2s;
}
.modal-lg { width:min(720px,95vw); }
.modal h2 { font-size:18px; font-weight:700; margin-bottom:16px; }
.modal-close {
  float:right; background:none; border:none; color:rgba(255,255,255,0.4);
  font-size:20px; cursor:pointer; padding:0 4px; line-height:1;
}
.modal-close:hover { color:#fff; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }

/* ── Form elements ── */
input[type=text], input[type=url], input[type=number], textarea, select {
  width:100%; padding:10px 12px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
  color:#fff; font:inherit; font-size:14px; outline:none; transition:border .15s;
}
input:focus, textarea:focus, select:focus { border-color:var(--brand); }
select option { background:#1e293b; }
label { display:block; font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:5px; font-weight:600; letter-spacing:.3px; }
.form-group { margin-bottom:14px; }
.btn-primary {
  padding:10px 20px; background:var(--brand); color:#fff; border:none;
  border-radius:var(--radius-sm); cursor:pointer; font:inherit; font-size:14px;
  font-weight:600; transition:all .15s; width:100%;
}
.btn-primary:hover { background:var(--brand-dark); }
.btn-secondary {
  padding:8px 16px; background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius-sm); cursor:pointer; font:inherit; font-size:13px; transition:all .15s;
}
.btn-secondary:hover { background:rgba(255,255,255,0.15); }
.btn-row { display:flex; gap:8px; margin-top:16px; }
.btn-row .btn-primary { flex:1; }

/* ── Widget Menu ── */
#widget-menu {
  position:fixed; background:#0f172a; border:1px solid var(--glass-border);
  border-radius:18px; box-shadow:0 20px 56px rgba(0,0,0,0.6);
  padding:14px 12px; z-index:1500; width:288px;
  max-height:calc(100vh - 80px); overflow-y:auto; scrollbar-width:none;
}
#widget-menu::-webkit-scrollbar { display:none; }
.wm-cat {
  font-size:9.5px; color:rgba(255,255,255,0.32); font-weight:700;
  letter-spacing:1px; text-transform:uppercase; padding:8px 6px 5px;
}
.wm-cat:first-child { padding-top:2px; }
.wm-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:4px; }
.wm-item {
  display:flex; align-items:center; gap:7px; padding:8px 10px;
  border-radius:10px; background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.07);
  cursor:pointer; color:#fff; font:inherit; font-size:12.5px; font-weight:500;
  transition:all .12s; text-align:left;
  overflow:hidden; min-width:0; width:100%;
}
.wm-item:hover { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.15); }
.wm-item:active { transform:scale(0.97); }
.wm-item .wm-emoji { font-size:15px; flex-shrink:0; line-height:1; }
.wm-item .wm-label { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; flex:1; }

/* ── Templates grid ── */
.template-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.tpl-card {
  border-radius:var(--radius-sm); border:1px solid rgba(255,255,255,0.1);
  padding:14px; cursor:pointer; transition:all .15s; background:rgba(255,255,255,0.04);
}
.tpl-card:hover { background:rgba(255,255,255,0.1); border-color:var(--brand); transform:translateY(-1px); }
.tpl-emoji { font-size:28px; margin-bottom:6px; }
.tpl-name { font-size:13px; font-weight:700; }
.tpl-desc { font-size:11px; color:rgba(255,255,255,0.45); margin-top:3px; }

/* ── BG Picker ── */
.bg-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
.bg-swatch { height:44px; border-radius:8px; border:2px solid transparent; cursor:pointer; transition:all .15s; }
.bg-swatch:hover { transform:scale(1.05); }
.bg-swatch.sel { border-color:#fff; }

/* ── iCal modal ── */
.ical-info { font-size:12px; color:rgba(255,255,255,0.4); line-height:1.6; margin-top:8px; }

/* ── Floating KI-Chat ── */
#ki-fab {
  position:fixed; bottom:24px; left:24px; z-index:2000;
  width:52px; height:52px; border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#6366f1);
  border:2px solid rgba(255,255,255,0.2);
  cursor:pointer;
  box-shadow:0 4px 24px rgba(99,102,241,0.6), 0 0 0 0 rgba(99,102,241,0.4);
  display:flex; align-items:center; justify-content:center;
  transition:all .25s; padding:0;
  animation: ki-pulse 3s ease-in-out infinite;
}
@keyframes ki-pulse {
  0%,100% { box-shadow:0 4px 24px rgba(99,102,241,0.6), 0 0 0 0 rgba(99,102,241,0.3); }
  50% { box-shadow:0 4px 24px rgba(99,102,241,0.6), 0 0 0 8px rgba(99,102,241,0); }
}
#ki-fab:hover { transform:scale(1.12); box-shadow:0 8px 32px rgba(99,102,241,0.8); animation:none; }
#ki-fab:active { transform:scale(0.96); }
#ki-panel {
  position:fixed; bottom:80px; left:20px; z-index:2000;
  width:320px; height:420px;
  background:rgba(15,15,25,0.95); backdrop-filter:blur(20px);
  border:1px solid rgba(99,102,241,0.3); border-radius:16px;
  box-shadow:0 16px 48px rgba(0,0,0,0.6);
  display:flex; flex-direction:column; overflow:hidden;
  transform:scale(0.9) translateY(10px); opacity:0;
  transition:all .2s; pointer-events:none;
}
#ki-panel.open { transform:scale(1) translateY(0); opacity:1; pointer-events:all; }
#ki-panel-header {
  padding:12px 14px; background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(99,102,241,0.2));
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}
#ki-panel-header span:first-child { font-size:18px; }
#ki-panel-header b { font-size:13px; flex:1; }
#ki-panel-header small { font-size:10px; color:rgba(255,255,255,0.35); }
#ki-history {
  flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px;
  scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent;
}
.ki-bubble { padding:8px 11px; border-radius:10px; font-size:12.5px; line-height:1.45; max-width:90%; word-break:break-word; }
.ki-bubble.user { background:rgba(99,102,241,0.3); align-self:flex-end; }
.ki-bubble.ai { background:rgba(255,255,255,0.07); align-self:flex-start; }
.ki-bubble.thinking { color:rgba(255,255,255,0.4); font-style:italic; }
#ki-input-row { display:flex; gap:6px; padding:10px; border-top:1px solid rgba(255,255,255,0.07); flex-shrink:0; }
#ki-textarea {
  flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; color:#fff; font-size:12px; padding:7px 10px;
  resize:none; height:38px; font-family:inherit; touch-action:auto;
}
#ki-textarea:focus { outline:none; border-color:rgba(99,102,241,0.5); }
#ki-send { background:var(--brand); border:none; border-radius:8px; color:#fff; 
  width:36px; height:38px; cursor:pointer; font-size:14px; flex-shrink:0; transition:background .15s; }
#ki-send:hover { background:var(--brand-dark); }
/* ── Zeichnen-Modus ── */
#draw-toolbar {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  display:none; align-items:center; gap:6px;
  background:rgba(10,10,20,0.92); backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.12); border-radius:40px;
  padding:8px 14px; z-index:1800;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
#draw-toolbar.visible { display:flex; }
.draw-tool-btn {
  width:36px; height:36px; border-radius:50%; border:2px solid transparent;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:16px; background:rgba(255,255,255,0.08); color:#fff;
  transition:all .15s; flex-shrink:0;
}
.draw-tool-btn:hover { background:rgba(255,255,255,0.18); }
.draw-tool-btn.active { border-color:var(--brand); background:rgba(99,102,241,0.25); }
.draw-color-btn {
  width:28px; height:28px; border-radius:50%; border:3px solid transparent;
  cursor:pointer; flex-shrink:0; transition:transform .15s;
}
.draw-color-btn:hover, .draw-color-btn.active { transform:scale(1.25); border-color:#fff; }
.draw-sep { width:1px; height:28px; background:rgba(255,255,255,0.12); margin:0 2px; }
#draw-size-slider {
  width:70px; accent-color:var(--brand); cursor:pointer;
}
#draw-canvas {
  position:absolute; inset:0; z-index:500; touch-action:none;

const SUPABASE_URL  = 'https://ubroujkwoizghiiustri.supabase.co';

/* SQL für Supabase SQL-Editor (einmalig ausführen):
──────────────────────────────────────────────────────
create table if not exists public.boards (
  user_id uuid primary key references auth.users on delete cascade,
  data    jsonb not null default '{}'::jsonb,
  updated_at timestamptz default now()
);
alter table public.boards enable row level security;
create policy "own" on public.boards for all using (auth.uid() = user_id);
──────────────────────────────────────────────────────

// ══════════════════════════════════════════════════════════════
// AUTH MODULE
// ══════════════════════════════════════════════════════════════
const AUTH = {
  client: null,
  user: null,
  _syncTimer: null,
  _configured: false,

  init() {
    if (!window.supabase || SUPABASE_URL.includes('DEINE')) {
      console.info('KlassenBoard: Supabase nicht konfiguriert — lokaler Modus aktiv.');
      return;
    }
    try {
      this._configured = true;
      this.client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      // Bestehende Session wiederherstellen
      this.client.auth.getSession().then(({ data }) => {
        if (data?.session) {
          this.user = data.session.user;
          this._updateUI();
          this.loadFromCloud();
        }
      });
      this.client.auth.onAuthStateChange((event, session) => {
        this.user = session?.user || null;
        this._updateUI();
        if (event === 'SIGNED_IN')  this.loadFromCloud();
        if (event === 'SIGNED_OUT') { APP.load(); renderAll(); toast('👋 Abgemeldet'); }
      });
    } catch(e) { console.warn('Supabase init error:', e); }
  },

  async login(email, password) {
    const { error } = await this.client.auth.signInWithPassword({ email, password });
    if (error) throw error;
  },

  async register(email, password) {
    const { error } = await this.client.auth.signUp({ email, password });
    if (error) throw error;
  },

  async logout() {
    if (this.client) await this.client.auth.signOut();
  },

  syncToCloud() {
    if (!this.client || !this.user) return;
    clearTimeout(this._syncTimer);
    this._setSyncDot('syncing');
    this._syncTimer = setTimeout(() => this._doSync(), 1500);
  },

  async _doSync() {
    if (!this.client || !this.user) return;
    try {
      const data = {
        boards: APP.state.boards,
        activeBoardId: APP.state.activeBoardId,
        icalCache: APP.icalCache,
      };
      const { error } = await this.client
        .from('boards')
        .upsert({ user_id: this.user.id, data, updated_at: new Date().toISOString() });
      if (error) throw error;
      this._setSyncDot('ok');
    } catch(e) {
      console.warn('Cloud-Sync fehlgeschlagen:', e);
      this._setSyncDot('error');
    }
  },

  async loadFromCloud() {
    if (!this.client || !this.user) return;
    try {
      const { data, error } = await this.client
        .from('boards')
        .select('data')
        .eq('user_id', this.user.id)
        .maybeSingle();
      if (error) throw error;
      if (!data) return; // Erster Login – localStorage bleibt
      APP.state.boards      = data.data.boards || [];
      APP.state.activeBoardId = data.data.activeBoardId || null;
      APP.icalCache          = data.data.icalCache || {};
      if (!APP.state.boards.find(b => b.id === APP.state.activeBoardId)) {
        APP.state.activeBoardId = APP.state.boards[0]?.id || null;
      }
      if (APP.state.boards.length === 0) createBoard('Meine Tafel');
      else renderAll();
      toast('☁️ Boards aus der Cloud geladen');
    } catch(e) { console.warn('Cloud-Load fehlgeschlagen:', e); }
  },

  _updateUI() {
    const badge    = document.getElementById('user-badge');
    const loginBtn = document.getElementById('auth-login-btn');
    const emailEl  = document.getElementById('user-email');
    const avatarEl = document.getElementById('user-avatar');
    if (this.user) {
      const email = this.user.email || '';
      const meta = this.user.user_metadata || {};
      const displayName = meta.last_name || meta.lastName || meta.name?.split(' ').pop() || email.split('@')[0];
      emailEl.textContent  = displayName;
      avatarEl.textContent = displayName[0]?.toUpperCase() || '?';
      badge.classList.add('visible');
      loginBtn.style.display = 'none';
    } else {
      badge.classList.remove('visible');
      loginBtn.style.display = '';
    }
  },

  _setSyncDot(state) {
    const dot = document.getElementById('sync-dot');
    if (!dot) return;
    dot.classList.toggle('syncing', state === 'syncing');
    if (state !== 'syncing') {
      dot.style.background = state === 'ok' ? '#22c55e' : '#f87171';
    }
  },
};

// ══════════════════════════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════════════════════════
const APP = {
  state: {
    boards: [],
    activeBoardId: null,
    editMode: true,
    undo: null,   // previous boards snapshot (1 level)
  },
  intervals: {},   // widgetId -> intervalId
  selectedId: null,
  saveTimer: null,
  icalCache: {},   // boardId -> { url, entries, lastFetched }

  // ── Persistence ──
  save() {
    clearTimeout(this.saveTimer);
    this.saveTimer = setTimeout(() => this._persist(), 500);
  },
  _persist() {
    try {
      const data = {
        boards: this.state.boards,
        activeBoardId: this.state.activeBoardId,
        icalCache: this.icalCache,
      };
      localStorage.setItem('klassenboard_v2', JSON.stringify(data));
      AUTH.syncToCloud(); // Cloud-Sync wenn eingeloggt
    } catch(e) { toast('⚠️ Speichern fehlgeschlagen'); }
  },
  load() {
    try {
      const raw = localStorage.getItem('klassenboard_v2');
      if (!raw) return false;
      const data = JSON.parse(raw);
      this.state.boards = data.boards || [];
      this.state.activeBoardId = data.activeBoardId || null;
      this.icalCache = data.icalCache || {};
      return true;
    } catch(e) { return false; }
  },
  exportAll() {
    const data = {
      version:2,
      exported: new Date().toISOString(),
      boards: this.state.boards,
      icalCache: this.icalCache,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'KlassenBoard_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    toast('✅ Exportiert');
  },
  importAll(json) {
    try {
      const data = JSON.parse(json);
      if (!data.boards) throw new Error('Ungültiges Format');
      this.snapshotUndo();
      this.state.boards = data.boards;
      this.icalCache = data.icalCache || {};
      if (!this.state.boards.find(b => b.id === this.state.activeBoardId)) {
        this.state.activeBoardId = this.state.boards[0]?.id || null;
      }
      this.save();
      renderAll();
      toast('✅ Importiert: ' + data.boards.length + ' Tafel(n)');
    } catch(e) { toast('❌ Import fehlgeschlagen: ' + e.message); }
  },
  deleteAllData() {
    localStorage.removeItem('klassenboard_v2');
    this.state.boards = [];
    this.state.activeBoardId = null;
    this.icalCache = {};
    this.intervals = {};
    createBoard('Tafel 1');
  },

  // ── Undo ──
  snapshotUndo() {
    this.state.undo = JSON.stringify(this.state.boards);
  },
  undo() {
    if (!this.state.undo) { toast('Kein Rückgängig verfügbar'); return; }
    const prev = JSON.parse(this.state.undo);
    this.state.undo = null;
    this.state.boards = prev;
    if (!this.state.boards.find(b => b.id === this.state.activeBoardId)) {
      this.state.activeBoardId = this.state.boards[0]?.id || null;
    }
    this.save();
    renderAll();
    toast('↩ Rückgängig');
  },

  // ── Board helpers ──
  activeBoard() { return this.state.boards.find(b => b.id === this.state.activeBoardId); },
};

// UTILITIES
// ══════════════════════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), dur);
}

function safeText(str) {
  const el = document.createElement('span');
  el.textContent = str || '';
  return el.innerHTML;
}

function el(tag, cls, attrs={}) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function openModal(html, onClose) {
  const overlay = el('div','modal-overlay');
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
  const close = () => { overlay.remove(); onClose && onClose(); };
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  const closeBtns = overlay.querySelectorAll('[data-close]');
  closeBtns.forEach(b => b.addEventListener('click', close));
  return { overlay, close };
}

function createBoard(name, bg, widgets=[]) {
  const board = {
    id: uid(),
    name: name || 'Neue Tafel',
    background: bg || { type:'gradient', value:'linear-gradient(135deg,#667eea,#764ba2)' },
    widgets: widgets.map(w => ({ ...w, id: uid(), createdAt: new Date().toISOString() })),
    createdAt: new Date().toISOString(),
  };
  APP.state.boards.push(board);
  APP.state.activeBoardId = board.id;
  APP.save();
  renderAll();
  return board;
}

function switchBoard(id) {
  // Save drawing of current board before switching
  DRAW.saveBoard(APP.state.activeBoardId);
  APP.state.activeBoardId = id;
  APP.selectedId = null;
  stopAllIntervals();
  APP.save();
  renderBoardTabs();
  renderBoardBg();
  renderWidgets();
  // Load drawing of new board
  DRAW.loadBoard(id);
}

function deleteBoard(id) {
  if (APP.state.boards.length <= 1) { toast('Mindestens eine Tafel erforderlich'); return; }
  APP.snapshotUndo();
  // Find index and name of deleted board
  const delIdx = APP.state.boards.findIndex(b => b.id === id);
  const delName = APP.state.boards[delIdx]?.name || '';
  // Check if deleted board had default name "Tafel N"
  const defaultMatch = delName.match(/^Tafel (\d+)$/);
  const delNum = defaultMatch ? parseInt(defaultMatch[1]) : null;

  APP.state.boards = APP.state.boards.filter(b => b.id !== id);

  // Auto-renumber: boards with default name "Tafel M" where M > delNum → "Tafel M-1"
  if (delNum !== null) {
    APP.state.boards.forEach(b => {
      const m = b.name.match(/^Tafel (\d+)$/);
      if (m && parseInt(m[1]) > delNum) {
        b.name = 'Tafel ' + (parseInt(m[1]) - 1);
      }
    });
  }

  if (APP.state.activeBoardId === id) {
    const newIdx = Math.min(delIdx, APP.state.boards.length - 1);
    APP.state.activeBoardId = APP.state.boards[newIdx].id;
  }
  APP.save();
  renderAll();
}

function renameBoard(id, name) {
  const b = APP.state.boards.find(b => b.id === id);
  if (b) { b.name = name; APP.save(); renderBoardTabs(); }
}

// ══════════════════════════════════════════════════════════════
// WIDGET CRUD
// ══════════════════════════════════════════════════════════════
function addWidget(type, extraConfig={}) {
  const board = APP.activeBoard();
  if (!board) return;
  APP.snapshotUndo();
  const def = REGISTRY[type];
  const widget = {
    id: uid(),
    type,
    x: 40 + Math.random() * 80 | 0,
    y: 40 + Math.random() * 60 | 0,
    w: def.w,
    h: def.h,
    zIndex: nextZ(board),
    locked: false,
    config: { ...getDefaultConfig(type), ...extraConfig },
    createdAt: new Date().toISOString(),
  };
  board.widgets.push(widget);
  APP.save();
  renderWidgets();
  // select new widget
  APP.selectedId = widget.id;
  const wEl = document.querySelector('[data-wid="'+widget.id+'"]');
  if (wEl) wEl.classList.add('selected');
  return widget;
}

function removeWidget(id) {
  const board = APP.activeBoard();
  if (!board) return;
  APP.snapshotUndo();
  board.widgets = board.widgets.filter(w => w.id !== id);
  stopInterval(id);
  APP.selectedId = null;
  APP.save();
  renderWidgets();
}

function updateWidget(id, patch) {
  const board = APP.activeBoard();
  if (!board) return;
  const w = board.widgets.find(w => w.id === id);
  if (!w) return;
  Object.assign(w, patch);
  APP.save();
}

function nextZ(board) {
  return (board.widgets.reduce((m, w) => Math.max(m, w.zIndex || 0), 0)) + 1;
}

function getDefaultConfig(type) {
  const defaults = {
    clock:     {},
    timer:     { minutes: 5, seconds: 0, running: false, endAt: null },
    stopwatch: { running: false, elapsed: 0, laps: [] },
    text:      { text: 'Doppelklick zum Bearbeiten' },
    traffic:   { state: 'red' },
    qr:        { url: 'https://klassenboard.de', label: '' },
    names:     { names: 'Anna\nBen\nClara\nDavid\nEva\nFinn\nGreta\nHannes', highlighted: -1 },
    homework:  { subject: 'Fach', items: [] },
    goal:      { text: 'Heutiges Lernziel' },
    timetable: { icalUrl: '', entries: [] },
    image:     { src: '', alt: '' },
    youtube:   { videoId: '', autoplay: false },
    dice:      { value: 1 },
    randomnum: { min: 1, max: 30, value: null },
    groups:    { names: 'Anna\nBen\nClara\nDavid\nEva\nFinn', size: 3 },

// INTERVAL MANAGEMENT
// ══════════════════════════════════════════════════════════════
function startInterval(wid, fn, ms) {
  stopInterval(wid);
  APP.intervals[wid] = setInterval(fn, ms);
}
function stopInterval(wid) {
  clearInterval(APP.intervals[wid]);
  delete APP.intervals[wid];
}
function stopAllIntervals() {
  Object.keys(APP.intervals).forEach(stopInterval);
}

// ── Audio streams (Geräuschpegel-Widget) ──
const AUDIO_STREAMS = {};
// ── Supabase Realtime channels (Poll-Widget) ──
const POLL_CHANNELS = {}; // widgetId -> { stream, ctx, raf }
function stopAudioStream(wid) {
  const a = AUDIO_STREAMS[wid];
  if (!a) return;
  cancelAnimationFrame(a.raf);
  a.stream?.getTracks().forEach(t => t.stop());
  a.ctx?.close().catch(()=>{});
  delete AUDIO_STREAMS[wid];
}
function stopAllAudioStreams() {
  Object.keys(AUDIO_STREAMS).forEach(stopAudioStream);
}

function renderBoardTabs() {
  const container = document.getElementById('board-tabs');
  container.innerHTML = '';
  APP.state.boards.forEach(board => {
    const btn = el('button','tab-btn' + (board.id === APP.state.activeBoardId ? ' active' : ''));

    editBtn.title = 'Umbenennen';

    const closeX = document.createElement('span');
    closeX.className = 'tab-action tab-close';

function openRenameModal(board) {

  document.getElementById('rename-modal-overlay')?.remove();

  const overlay = document.createElement('div');
  overlay.id = 'rename-modal-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px)';

  box.innerHTML = '<div style="font-size:14px;font-weight:700;margin-bottom:12px">✏️ Tafel umbenennen</div>';

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = board.name;
  inp.style.cssText = 'width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;font-size:14px;padding:9px 12px;margin-bottom:12px;box-sizing:border-box;touch-action:auto;outline:none';
  inp.addEventListener('click', e => e.stopPropagation());

  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:8px;justify-content:flex-end';

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Abbrechen';
  cancelBtn.style.cssText = 'padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;font-size:13px';

  const okBtn = document.createElement('button');
  okBtn.textContent = 'Speichern';
  okBtn.style.cssText = 'padding:8px 16px;border-radius:8px;border:none;background:#6366f1;color:#fff;cursor:pointer;font-size:13px;font-weight:600';

  const close = () => overlay.remove();
  const confirm_rename = () => {
    const name = inp.value.trim();
    if (name) renameBoard(board.id, name);
    close();
  };

  okBtn.addEventListener('click', confirm_rename);

function renderBoardBg() {
  const board = APP.activeBoard();
  const bgEl = document.getElementById('board-bg');
  if (!board) return;
  const bg = board.background;
  if (bg.type === 'gradient') bgEl.style.background = bg.value;

function buildWidgetEl(w) {
  const shell = el('div','widget' + (w.id === APP.selectedId ? ' selected' : ''));
  shell.dataset.wid = w.id;
  shell.style.cssText = `left:${w.x}px;top:${w.y}px;width:${w.w}px;height:${w.h}px;z-index:${w.zIndex||1}`;

  // Header (only in edit mode)
  if (APP.state.editMode) {
    const hdr = el('div','widget-header');
    const titleEl = el('span','widget-title');
    titleEl.textContent = REGISTRY[w.type]?.label || w.type;
    const actions = el('div','widget-actions');
    const settBtn = el('button','w-btn'); settBtn.textContent = '⚙'; settBtn.title = 'Einstellungen';
    settBtn.addEventListener('click', e => { e.stopPropagation(); openWidgetSettings(w.id); });
    const delBtn = el('button','w-btn del'); delBtn.textContent = '✕'; delBtn.title = 'Löschen';
    delBtn.addEventListener('click', e => { e.stopPropagation(); removeWidget(w.id); });
    actions.append(settBtn, delBtn);
    hdr.append(titleEl, actions);
    shell.appendChild(hdr);

    const rh = el('div','resize-handle');

  // Body
  const body = el('div','widget-body' + (APP.state.editMode ? ' with-header' : ''));
  renderWidgetContent(w, body);

  // Click to select
  shell.addEventListener('pointerdown', e => {

    document.querySelectorAll('.widget').forEach(el => el.classList.remove('selected'));
    shell.classList.add('selected');

    const board = APP.activeBoard();
    if (board) {
      w.zIndex = nextZ(board);
      shell.style.zIndex = w.zIndex;
      APP.save();
    }
  });

  return shell;
}

// ══════════════════════════════════════════════════════════════
// DRAG & RESIZE (Pointer Events)
// ══════════════════════════════════════════════════════════════
function initDrag(shell, handle, w) {
  let startX, startY, startLeft, startTop;
  handle.addEventListener('pointerdown', e => {
    if (!APP.state.editMode) return;
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    startX = e.clientX; startY = e.clientY;
    startLeft = w.x; startTop = w.y;
    handle.addEventListener('pointermove', onMove);
    handle.addEventListener('pointerup', onUp, {once:true});
  });
  function onMove(e) {
    const dx = e.clientX - startX, dy = e.clientY - startY;
    w.x = Math.max(0, startLeft + dx);
    w.y = Math.max(0, startTop + dy);
    shell.style.left = w.x + 'px';
    shell.style.top  = w.y + 'px';
  }
  function onUp() {
    handle.removeEventListener('pointermove', onMove);
    APP.save();
  }
}

function initResize(shell, handle, w) {
  let startX, startY, startW, startH;
  handle.addEventListener('pointerdown', e => {
    e.preventDefault(); e.stopPropagation();
    handle.setPointerCapture(e.pointerId);
    startX = e.clientX; startY = e.clientY;
    startW = w.w; startH = w.h;
    handle.addEventListener('pointermove', onMove);
    handle.addEventListener('pointerup', onUp, {once:true});
  });
  function onMove(e) {
    const dx = e.clientX - startX, dy = e.clientY - startY;
    w.w = Math.max(120, startW + dx);
    w.h = Math.max(80, startH + dy);
    shell.style.width  = w.w + 'px';
    shell.style.height = w.h + 'px';
  }
  function onUp() {
    handle.removeEventListener('pointermove', onMove);
    APP.save();
    // re-render content so QR etc. resizes
    const body = shell.querySelector('.widget-body');
    if (body) renderWidgetContent(w, body);
  }
}

// ══════════════════════════════════════════════════════════════
// WIDGET CONTENT RENDERERS
// ══════════════════════════════════════════════════════════════
function renderWidgetContent(w, body) {
  body.innerHTML = '';
  const fn = WIDGET_RENDERERS[w.type];
  if (fn) fn(w, body);
}

const WIDGET_RENDERERS = {

  // ── Clock ──
  clock(w, body) {
    body.style.flexDirection = 'column';
    const time = el('div','w-clock');
    const date = el('div','w-date');
    // HH:MM:SS = 8 chars, each ~0.62em wide with tabular-nums
    const maxByWidth = (w.w - 16) / 4.96;
    const maxByHeight = w.h * 0.42;
    const clockFs = Math.max(18, Math.min(maxByWidth, maxByHeight));
    time.style.fontSize = clockFs + 'px';
    time.style.whiteSpace = 'nowrap';
    time.style.letterSpacing = '-0.02em';
    date.style.fontSize = Math.max(11, clockFs * 0.28) + 'px';
    body.append(time, date);
    function update() {
      const now = new Date();
      time.textContent = now.toLocaleTimeString('de-DE');
      date.textContent = now.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    }
    update();
    startInterval(w.id, update, 1000);
  },

  // ── Timer ──
  timer(w, body) {
    body.style.flexDirection = 'column';
    const display = el('div','w-timer-display');
    // MM:SS = 5 chars
    const timerFs = Math.max(28, Math.min((w.w - 16) / 3.1, w.h * 0.40));
    display.style.fontSize = timerFs + 'px';
    const row = el('div','w-btn-row');
    const startBtn = el('button','w-action-btn');
    const resetBtn = el('button','w-action-btn');
    resetBtn.textContent = '↺';
    row.append(startBtn, resetBtn);
    body.append(display, row);

    let remaining = (w.config.minutes||5)*60 + (w.config.seconds||0);
    let running = false;
    let endAt = null;

    function fmt(s) {
      const m = Math.floor(s/60), sec = s%60;
      return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
    }
    function updateDisplay() {
      display.textContent = fmt(Math.max(0,remaining));
      display.classList.toggle('urgent', remaining <= 30 && running);
      startBtn.textContent = running ? '⏸ Pause' : (remaining < (w.config.minutes||5)*60+(w.config.seconds||0) ? '▶ Weiter' : '▶ Start');
    }
    function tick() {
      if (!running) return;
      remaining = Math.max(0, Math.round((endAt - Date.now())/1000));
      updateDisplay();
      if (remaining <= 0) {
        running = false;
        startInterval(w.id+'_', ()=>{}, 99999);
        stopInterval(w.id);
        toast('⏰ Zeit abgelaufen!', 5000);
      }
    }
    startBtn.addEventListener('click', () => {
      if (remaining <= 0) return;
      running = !running;
      if (running) {
        endAt = Date.now() + remaining*1000;
        startInterval(w.id, tick, 250);
      } else {
        stopInterval(w.id);
      }
      updateDisplay();
    });
    resetBtn.addEventListener('click', () => {
      running = false; stopInterval(w.id);
      remaining = (w.config.minutes||5)*60 + (w.config.seconds||0);
      updateDisplay();
    });
    updateDisplay();
  },

  // ── Stopwatch ──
  stopwatch(w, body) {
    body.style.flexDirection = 'column';
    const display = el('div','w-timer-display');
    // MM:SS = 5 chars
    const timerFs = Math.max(28, Math.min((w.w - 16) / 3.1, w.h * 0.40));
    display.style.fontSize = timerFs + 'px';
    const row = el('div','w-btn-row');
    const startBtn = el('button','w-action-btn');
    const lapBtn = el('button','w-action-btn'); lapBtn.textContent = '⚑ Runde';
    const resetBtn = el('button','w-action-btn'); resetBtn.textContent = '↺';
    row.append(startBtn, lapBtn, resetBtn);
    const lapsDiv = el('div'); lapsDiv.style.cssText='width:100%;overflow-y:auto;max-height:70px;margin-top:6px;font-size:11px;font-family:monospace;color:rgba(255,255,255,0.5)';
    body.append(display, row, lapsDiv);

    let elapsed = 0, running = false, startedAt = null, laps = [];
    function fmt(ms) {
      const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), cs=Math.floor((ms%1000)/10);
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
    }
    function update() {
      if (running) elapsed = Date.now() - startedAt + (elapsed);
      // handled via tick
      display.textContent = fmt(elapsed);
      startBtn.textContent = running ? '⏸ Pause' : '▶ Start';
    }
    startBtn.addEventListener('click', () => {
      if (!running) {
        const base = elapsed;
        startedAt = Date.now() - base;
        running = true;
        startInterval(w.id, () => { elapsed = Date.now() - startedAt; display.textContent = fmt(elapsed); }, 50);
      } else {
        running = false; stopInterval(w.id);
      }
      startBtn.textContent = running ? '⏸ Pause' : '▶ Start';
    });
    lapBtn.addEventListener('click', () => {
      if (!running) return;
      laps.push(elapsed);
      const d = el('div');
      d.textContent = `Runde ${laps.length}: ${fmt(laps[laps.length-1])}`;
      lapsDiv.prepend(d);
    });
    resetBtn.addEventListener('click', () => {
      running = false; stopInterval(w.id);
      elapsed = 0; laps = [];
      display.textContent = fmt(0);
      lapsDiv.innerHTML = '';
      startBtn.textContent = '▶ Start';
    });
    display.textContent = fmt(0);
  },

  // ── Text ──
  text(w, body) {
    const div = el('div','w-text-display');
    div.style.color = w.config.color || '#fff';
    const text = w.config.text || '';
    const charCount = Math.max(text.length, 1);
    // If user set explicit font size respect it, otherwise auto-scale
    const autoFs = Math.min(w.w * 0.07, w.h * 0.25) * Math.min(1, Math.pow(40 / charCount, 0.35));
    div.style.fontSize = (w.config.fontSize || Math.max(14, Math.min(autoFs, 72))) + 'px';
    div.textContent = text;
    if (APP.state.editMode) {
      div.addEventListener('dblclick', e => {
        e.stopPropagation();
        openTextEdit(w);
      });
    }
    body.appendChild(div);
  },

  // ── Traffic Light ──
  traffic(w, body) {
    const states = ['red','yellow','green'];
    const labels = ['🔴 Ruhe','🟡 Flüstern','🟢 Sprechen'];
    body.style.flexDirection = 'column'; body.style.gap = '10px';
    const circles = [];
    const circleSize = Math.max(40, Math.min(w.w * 0.26, w.h * 0.32)) + 'px';
    const labelFs = Math.max(12, Math.min(w.w * 0.07, 22)) + 'px';
    const labelEl = el('div'); labelEl.style.cssText=`font-size:${labelFs};font-weight:600;color:rgba(255,255,255,0.9)`;

    states.forEach((s,i) => {
      const c = el('div','w-traffic-circle');
      c.dataset.state = s;
      c.style.width = circleSize; c.style.height = circleSize;
      circles.push(c);
      c.addEventListener('click', () => {
        w.config.state = s;
        updateCircles();
        APP.save();
      });
    });

    function updateCircles() {
      circles.forEach((c,i) => {
        c.className = 'w-traffic-circle';
        if (states[i] === w.config.state) {
          c.classList.add('active-' + states[i].charAt(0));
        } else {
          c.classList.add('dim');
        }
      });
      const idx = states.indexOf(w.config.state);
      labelEl.textContent = labels[idx] || '';
    }
    const circleRow = el('div'); circleRow.style.cssText='display:flex;gap:12px;align-items:center';
    circleRow.append(...circles);
    body.append(circleRow, labelEl);
    updateCircles();
  },

  // ── QR Code ──
  qr(w, body) {
    const container = el('div','w-qr-container');
    const qrDiv = el('div');
    qrDiv.style.cssText='background:#fff;padding:6px;border-radius:8px;display:inline-flex';
    const label = el('div','w-qr-label');
    label.textContent = w.config.label || w.config.url || '';
    container.append(qrDiv, label);
    body.appendChild(container);
    const url = w.config.url || 'https://klassenboard.netlify.app';
    const size = Math.min(w.w - 40, w.h - 60, 160);
    try {
      new QRCode(qrDiv, { text: url, width: size, height: size, correctLevel: QRCode.CorrectLevel.M });
    } catch(e) { qrDiv.textContent = 'QR-Fehler'; }
  },

  // ── Random Name ──
  names(w, body) {
    body.style.flexDirection = 'column';
    const names = (w.config.names || '').split('\n').map(s=>s.trim()).filter(Boolean);
    let highlighted = w.config.highlighted ?? -1;
    const list = el('ul','w-names-list');
    const btn = el('button','w-action-btn'); btn.style.margin='0 auto 8px'; btn.textContent = '🎲 Zufällig';

    // Scale font: bigger when fewer names, smaller when many
    const itemCount = Math.max(names.length, 1);
    const itemFs = Math.max(13, Math.min(32, (w.h - 60) / itemCount * 0.7));
    const highlightFs = Math.min(itemFs * 1.5, 42);

    function render() {
      list.innerHTML = '';
      names.forEach((n,i) => {
        const li = document.createElement('li');
        li.textContent = n;
        li.style.fontSize = (i === highlighted ? highlightFs : itemFs) + 'px';
        if (i === highlighted) li.classList.add('highlighted');
        list.appendChild(li);
      });
    }
    btn.addEventListener('click', () => {
      if (!names.length) return;
      highlighted = Math.floor(Math.random() * names.length);
      w.config.highlighted = highlighted;
      APP.save();
      render();
    });
    body.append(btn, list);
    render();
  },

  // ── Homework ──
  homework(w, body) {
    const div = el('div','w-homework');
    const items = w.config.items || [];

      div.append(h3, ul);
      body.appendChild(div);

      return;

      li.style.fontSize = itemFs + 'px';
      li.style.paddingTop = Math.max(3, itemFs * 0.2) + 'px';

      ul.appendChild(li);

  // ── Lautstärke / Noise Meter ──
  noise(w, body) {
    stopAudioStream(w.id);
    body.style.cssText += 'flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px;';

    // Emoji + Label
    const emojiEl = el('div');
    emojiEl.style.cssText = 'font-size:42px;line-height:1;transition:all .2s;';
    emojiEl.textContent = '😴';

    const labelEl = el('div');
    labelEl.style.cssText = 'font-size:13px;font-weight:700;letter-spacing:.5px;color:#fff;transition:color .3s;';
    labelEl.textContent = 'LEISE';

    // Balken-Meter (5 Balken)
    const bars = el('div');
    bars.style.cssText = 'display:flex;align-items:flex-end;gap:4px;height:48px;';
    const barEls = [];
    const barHeights = [20, 30, 45, 35, 25];
    barHeights.forEach((h, i) => {
      const b = el('div');
      b.style.cssText = `width:10px;border-radius:4px;background:rgba(255,255,255,0.15);height:${h}%;transition:height .1s,background .3s;`;
      bars.appendChild(b);
      barEls.push(b);
    });

    // Mikrofon-Button
    const micBtn = el('button');
    micBtn.style.cssText = 'margin-top:4px;padding:6px 14px;border-radius:20px;border:none;background:rgba(99,102,241,0.3);color:#a5b4fc;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;';
    micBtn.textContent = '🎤 Mikrofon starten';

    body.append(emojiEl, bars, labelEl, micBtn);

    let running = false;

    function getColor(level) {
      const low  = (w.config.lowThreshold  ?? 25) / 100;
      const high = (w.config.highThreshold ?? 55) / 100;
      if (level < low)  return { bg:'#22c55e', label:'LEISE',  emoji:'😴' };
      if (level < high) return { bg:'#f59e0b', label:'MITTEL', emoji:'🤫' };
      return                   { bg:'#ef4444', label:'LAUT',   emoji:'🔊' };
    }

    function startMic() {
      if (running) return;
      running = true;
      micBtn.textContent = '⏹ Stoppen';
      micBtn.style.background = 'rgba(239,68,68,0.25)';
      micBtn.style.color = '#fca5a5';

      navigator.mediaDevices.getUserMedia({ audio: true, video: false })
        .then(stream => {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const source = ctx.createMediaStreamSource(stream);
          const analyser = ctx.createAnalyser();
          analyser.fftSize = 128;
          analyser.smoothingTimeConstant = 0.6;
          source.connect(analyser);
          const data = new Uint8Array(analyser.frequencyBinCount);

          function tick() {
            analyser.getByteFrequencyData(data);
            const avg = data.reduce((a,b) => a+b, 0) / data.length / 128;
            const multiplier = (w.config.sensitivity ?? 3) / 3 * 2.5;
            const level = Math.min(avg * multiplier, 1);

            // Update bars
            barEls.forEach((b, i) => {
              const threshold = (i + 1) / barEls.length;
              const active = level >= threshold * 0.8;
              const col = getColor(level);
              b.style.height = active ? `${barHeights[i] + level * 40}%` : `${barHeights[i]}%`;
              b.style.background = active ? col.bg : 'rgba(255,255,255,0.12)';
            });

            const col = getColor(level);
            emojiEl.textContent = col.emoji;
            labelEl.textContent = col.label;
            labelEl.style.color = col.bg;

            const raf = requestAnimationFrame(tick);
            AUDIO_STREAMS[w.id] = { stream, ctx, raf };
          }
          tick();
        })
        .catch(err => {
          running = false;
          micBtn.textContent = '🎤 Mikrofon starten';
          micBtn.style.background = 'rgba(99,102,241,0.3)';
          micBtn.style.color = '#a5b4fc';
          emojiEl.textContent = '❌';
          labelEl.textContent = 'Kein Zugriff';
          labelEl.style.color = '#f87171';
        });
    }

    function stopMic() {
      running = false;
      stopAudioStream(w.id);
      micBtn.textContent = '🎤 Mikrofon starten';
      micBtn.style.background = 'rgba(99,102,241,0.3)';
      micBtn.style.color = '#a5b4fc';
      emojiEl.textContent = '😴';
      labelEl.textContent = 'LEISE';
      labelEl.style.color = '#fff';
      barEls.forEach((b,i) => { b.style.height = `${barHeights[i]}%`; b.style.background = 'rgba(255,255,255,0.12)'; });
    }

    micBtn.addEventListener('click', () => running ? stopMic() : startMic());
  },

  // ── Live-Umfrage ──
  poll(w, body) {
    // Cleanup old subscription
    if (POLL_CHANNELS[w.id]) {
      try { AUTH.client?.removeChannel(POLL_CHANNELS[w.id]); } catch(e) {}
      delete POLL_CHANNELS[w.id];
    }

    if (!w.config.question) {
      // Leerer Zustand
      const wrap = el('div');
      wrap.style.cssText = 'width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;border:2px dashed rgba(255,255,255,0.2);border-radius:12px;transition:all .2s;';
      const icon = el('div'); icon.style.fontSize = '36px'; icon.textContent = '📊';
      const txt = el('div'); txt.style.cssText = 'font-size:13px;color:rgba(255,255,255,0.55);text-align:center;font-weight:500;';
      txt.textContent = 'Live-Umfrage erstellen';
      const sub = el('div'); sub.style.cssText = 'font-size:11px;color:rgba(255,255,255,0.3);';
      sub.textContent = 'Hier klicken oder ⚙ oben rechts';
      wrap.append(icon, txt, sub);
      wrap.addEventListener('mouseenter', () => { wrap.style.borderColor='rgba(255,255,255,0.4)'; wrap.style.background='rgba(255,255,255,0.05)'; });
      wrap.addEventListener('mouseleave', () => { wrap.style.borderColor='rgba(255,255,255,0.2)'; wrap.style.background=''; });
      wrap.addEventListener('click', e => { e.stopPropagation(); openPollSettings(w); });
      body.appendChild(wrap);
      return;
    }

    const COLORS = ['#6366f1','#22c55e','#f59e0b','#ef4444'];
    const options = (w.config.options || []).filter(o => o.trim());
    const voteCounts = new Array(options.length).fill(0);
    const pollId = w.config.pollId;
    const votingUrl = window.location.origin + window.location.pathname + '?poll=' + pollId;

    // Layout
    const wrap = el('div');
    wrap.style.cssText = 'width:100%;height:100%;display:flex;flex-direction:column;padding:10px;gap:6px;overflow:hidden;';

    // Top row: question + QR
    const topRow = el('div');
    topRow.style.cssText = 'display:flex;gap:10px;align-items:flex-start;flex-shrink:0;';
    const qEl = el('div','poll-question'); qEl.textContent = w.config.question;
    qEl.style.flex = '1';
    const qrWrap = el('div'); qrWrap.id = 'poll-qr-'+w.id;
    qrWrap.style.cssText = 'width:72px;height:72px;flex-shrink:0;background:#fff;border-radius:8px;padding:3px;cursor:pointer;';
    qrWrap.title = 'Link kopieren';
    qrWrap.addEventListener('click', e => { e.stopPropagation(); navigator.clipboard.writeText(votingUrl).then(()=>toast('📋 Link kopiert!')); });
    topRow.append(qEl, qrWrap);

    // Bars
    const barsWrap = el('div'); barsWrap.style.cssText = 'flex:1;display:flex;flex-direction:column;justify-content:center;';
    const barFills = [], countEls = [];
    options.forEach((opt, i) => {
      const row = el('div','poll-bar-row');
      const lbl = el('div','poll-bar-label'); lbl.textContent = opt;
      const bg  = el('div','poll-bar-bg');
      const fill= el('div','poll-bar-fill'); fill.style.cssText = `width:0%;background:${COLORS[i%4]};`;
      const cnt = el('div','poll-bar-count'); cnt.textContent = '0';
      bg.appendChild(fill); row.append(lbl, bg, cnt);
      barsWrap.appendChild(row);
      barFills.push(fill); countEls.push(cnt);
    });

    const totalEl = el('div','poll-total'); totalEl.textContent = '0 Stimmen';

    // Controls
    const ctrl = el('div','poll-ctrl');
    const revealBtn = el('button');
    const revealed = w.config.showResults !== false; // default: sichtbar
    revealBtn.style.cssText = revealed
      ? 'background:rgba(34,197,94,0.2);color:#86efac;'
      : 'background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);';
    revealBtn.textContent = revealed ? '👁 Ergebnis sichtbar' : '🙈 Ergebnis versteckt';
    const resetBtn = el('button');
    resetBtn.style.cssText = 'background:rgba(239,68,68,0.2);color:#fca5a5;';
    resetBtn.textContent = '🗑 Reset';
    const copyBtn = el('button');
    copyBtn.style.cssText = 'background:rgba(99,102,241,0.2);color:#a5b4fc;';
    copyBtn.textContent = '📋 Link';
    const editBtn2 = el('button');
    editBtn2.style.cssText = 'background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);';
    editBtn2.textContent = '✏️';
    ctrl.append(revealBtn, resetBtn, copyBtn, editBtn2);

    // Ergebnis-Sichtbarkeit anwenden
    function applyVisibility() {
      const show = w.config.showResults !== false;
      barsWrap.style.filter  = show ? '' : 'blur(6px)';
      barsWrap.style.opacity = show ? '1' : '0.25';
      totalEl.style.filter   = show ? '' : 'blur(4px)';
      totalEl.style.opacity  = show ? '1' : '0.25';
      revealBtn.textContent  = show ? '👁 Ergebnis sichtbar' : '🙈 Ergebnis versteckt';
      revealBtn.style.cssText = show
        ? 'background:rgba(34,197,94,0.2);color:#86efac;'
        : 'background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);';
    }
    applyVisibility();

    revealBtn.addEventListener('click', e => {
      e.stopPropagation();
      w.config.showResults = w.config.showResults === false ? true : false;
      applyVisibility();
      APP.save();
    });

    wrap.append(topRow, barsWrap, totalEl, ctrl);
    body.appendChild(wrap);

    // QR Code generieren
    setTimeout(() => {
      const qrEl = document.getElementById('poll-qr-'+w.id);
      if (qrEl && window.QRCode) {
        try { new QRCode(qrEl, { text:votingUrl, width:66, height:66, correctLevel:QRCode.CorrectLevel.M }); }
        catch(e) {}
      }
    }, 80);

    function updateBars() {
      const total = voteCounts.reduce((a,b)=>a+b,0);
      totalEl.textContent = total + (total===1?' Stimme':' Stimmen');
      barFills.forEach((f,i) => {
        const pct = total>0 ? (voteCounts[i]/total*100) : 0;
        f.style.width = pct+'%';
        countEls[i].textContent = voteCounts[i];
      });
    }

    async function loadVotes() {
      if (!AUTH.client || !pollId) return;
      const { data } = await AUTH.client.from('poll_votes').select('option_index').eq('poll_id', pollId);
      if (data) { voteCounts.fill(0); data.forEach(v=>{ if(v.option_index<voteCounts.length) voteCounts[v.option_index]++; }); updateBars(); }
    }

    resetBtn.addEventListener('click', async e => {
      e.stopPropagation();
      if (!AUTH.client) { toast('Supabase nicht verbunden'); return; }
      await AUTH.client.from('poll_votes').delete().eq('poll_id', pollId);
      voteCounts.fill(0); updateBars(); toast('🗑 Stimmen zurückgesetzt');
    });
    copyBtn.addEventListener('click', e => { e.stopPropagation(); navigator.clipboard.writeText(votingUrl).then(()=>toast('📋 Link kopiert!')); });
    editBtn2.addEventListener('click', e => { e.stopPropagation(); openPollSettings(w); });

    if (AUTH.client && pollId) {
      loadVotes();
      const ch = AUTH.client.channel('poll-'+w.id)
        .on('postgres_changes', { event:'INSERT', schema:'public', table:'poll_votes', filter:'poll_id=eq.'+pollId },
          payload => { const i=payload.new.option_index; if(i>=0&&i<voteCounts.length){ voteCounts[i]++; updateBars(); } })
        .on('postgres_changes', { event:'DELETE', schema:'public', table:'poll_votes', filter:'poll_id=eq.'+pollId },
          () => loadVotes())
        .subscribe();
      POLL_CHANNELS[w.id] = ch;
    } else if (!AUTH.client) {
      totalEl.textContent = '⚠️ Anmelden für Live-Ergebnisse';
    }
  },

  // ── Frag die KI ──
  ask(w, body) {
    body.style.cssText += 'flex-direction:column;gap:7px;padding:10px;overflow:hidden;';

    // Note: image generation works without login, text AI needs login

    // ── Chat history ──
    const history = el('div','ask-history');
    const messages = w.config.messages || [];

    function renderMessages() {
      history.innerHTML = '';
      messages.forEach(m => {
        const b = el('div','ask-bubble ' + m.role);
        if (m.type === 'image') {
          const img = document.createElement('img');
          img.src = m.url;
          img.alt = m.text || 'Bild';
          img.style.cssText = 'max-width:100%;border-radius:8px;display:block;margin-top:4px;';
          img.onerror = () => { img.replaceWith(Object.assign(document.createElement('span'), {textContent:'❌ Bild konnte nicht geladen werden'})); };
          const label = document.createElement('div');
          label.style.cssText = 'font-size:11px;opacity:0.55;margin-bottom:3px;';
          label.textContent = '🖼 ' + (m.text || 'Generiertes Bild');
          b.append(label, img);
        } else {
          b.textContent = m.text;
        }
        history.appendChild(b);
      });
      setTimeout(() => { history.scrollTop = history.scrollHeight; }, 30);
    }
    renderMessages();

    // ── Top row (clear button) ──
    const topRow = el('div'); topRow.style.cssText='display:flex;justify-content:flex-end;flex-shrink:0;';
    const clearBtn = el('button','ask-clear-btn'); clearBtn.textContent='🗑 Verlauf löschen';
    clearBtn.addEventListener('click', e => {
      e.stopPropagation();
      w.config.messages = [];
      messages.length = 0;
      renderMessages();
      APP.save();
    });
    topRow.appendChild(clearBtn);

    // ── Input row ──
    const inputRow = el('div','ask-input-row');
    const textarea = document.createElement('textarea');
    textarea.placeholder = 'z.B. "Zeige einen Apfel" oder eine Frage stellen…';
    textarea.addEventListener('click', e => e.stopPropagation());
    textarea.addEventListener('keydown', e => {
      e.stopPropagation();
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
    });

    const sendBtn = el('button','ask-send-btn'); sendBtn.textContent = '➤';
    sendBtn.title = 'Frage stellen (Enter)';
    inputRow.append(textarea, sendBtn);

    body.append(topRow, history, inputRow);

    // ── Send ──
    // Detect image request from German keywords
    function isImageRequest(q) {
      return /^(zeig|zeige|mal|male|zeichne|generiere|erstell|bild von|bild:|foto von|zeig mir|zeige mir)/i.test(q.trim()) ||
             /(als bild|als foto|als zeichnung|als illustration)/i.test(q);
    }

    function extractImagePrompt(q) {
      // Strip leading command words, keep the subject
      return q.replace(/^(zeig(e)?|mal(e)?|zeichne|generiere|erstell(e)?|bild von|bild:|foto von|zeig mir|zeige mir)\s*/i, '').trim() || q;
    }

    sendBtn.addEventListener('click', async e => {
      e.stopPropagation();
      const q = textarea.value.trim();
      if (!q) return;

      textarea.value = '';
      messages.push({ role:'user', text:q });

      const thinkingBubble = el('div','ask-bubble thinking');
      history.appendChild(thinkingBubble);
      history.scrollTop = history.scrollHeight;
      sendBtn.disabled = true;

      try {
        if (isImageRequest(q)) {
          // ── Image generation via Pollinations.ai (free, no key) ──
          thinkingBubble.textContent = '🎨 Generiere Bild…';
          const subject = extractImagePrompt(q);
          const w_px = Math.min(800, Math.max(400, w.w * 2));
          const h_px = Math.min(600, Math.max(300, w.h * 1.5));
          const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(subject + ', clean illustration, educational, colorful')}?width=${w_px}&height=${h_px}&nologo=true&seed=${Date.now()}`;
          thinkingBubble.remove();
          messages.push({ role:'ai', type:'image', url, text: subject });
        } else {
          // ── Text answer via Supabase Edge Function ──
          thinkingBubble.textContent = '⏳ Denke nach…';
          if (!AUTH.user) throw new Error('Für Textfragen bitte zuerst anmelden (Konto-Icon oben rechts)');
          const { data, error } = await AUTH.client.functions.invoke('ai-generate', {
            body: { type:'ask', question: q }
          });
          if (error) throw new Error(error.message || String(error));
          const answer = data?.text || '(Keine Antwort)';
          thinkingBubble.remove();
          messages.push({ role:'ai', text:answer });
        }
        if (messages.length > 30) messages.splice(0, messages.length - 30);
        w.config.messages = messages;
        APP.save();
        renderMessages();
      } catch(err) {
        thinkingBubble.textContent = '❌ ' + err.message;
        thinkingBubble.style.color = '#fca5a5';
      } finally {
        sendBtn.disabled = false;
      }
    });
  },

    frame.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups';

    const blocker = document.createElement('div');
    blocker.style.cssText = 'display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#0f0f1a;padding:20px;text-align:center;';
    blocker.innerHTML = '<div style="font-size:36px">🚫</div><div style="color:#f87171;font-size:14px;font-weight:600">Diese Webseite blockiert die Einbettung</div><div style="color:rgba(255,255,255,0.4);font-size:12px;max-width:260px">Viele Seiten (Google, YouTube, ARD…) erlauben keine iframes aus Sicherheitsgründen.</div>';
    const openTabBtn = document.createElement('button');
    openTabBtn.textContent = '↗ In neuem Tab öffnen';
    openTabBtn.style.cssText = 'border:none;background:rgba(99,102,241,0.8);color:#fff;border-radius:8px;padding:8px 18px;cursor:pointer;font-size:13px;margin-top:4px';

      let u = url.trim();
      if (!u) return;
      if (!u.startsWith('http')) u = 'https://' + u;

      frame.style.display = 'block';

      urlInp.value = u;
      w.config.url = u;

    // Detect X-Frame-Options / CSP block via load timeout or error
    frame.addEventListener('load', () => {
      try {
        // If we can access contentDocument.body, it loaded fine
        const b = frame.contentDocument?.body;
        if (!b || b.innerHTML === '') throw new Error('blocked');

  // ── Datei-Anzeige Widget ──
  files(w, body) {
    body.style.flexDirection = 'column';
    body.style.padding = '0';
    body.style.overflow = 'hidden';

    const file = w.config.fileData; // { name, type, data (base64 or text) }

    if (!file) {
      // Drop zone
      const zone = document.createElement('div');
      zone.style.cssText = 'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer';
      zone.innerHTML = '<div style="font-size:36px">📂</div><div style="font-size:13px;color:rgba(255,255,255,0.6)">Datei hier ablegen oder klicken</div><div style="font-size:11px;color:rgba(255,255,255,0.3)">Bild · PDF · MP3 · Video · Text · und mehr</div>';

      const fileInp = document.createElement('input');
      fileInp.type = 'file';
      fileInp.accept = '*';
      fileInp.style.display = 'none';

      fileInp.addEventListener('change', () => {
        const f = fileInp.files[0];
        if (!f) return;
        const reader = new FileReader();
        reader.onload = e => {
          w.config.fileData = { name: f.name, type: f.type, data: e.target.result };
          APP.save();
          renderWidgetContent(w, body);
        };
        if (f.type.startsWith('text/')) reader.readAsText(f);
        else reader.readAsDataURL(f);
      });

      zone.addEventListener('click', e => { e.stopPropagation(); fileInp.click(); });

      // Drag & Drop
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.background = 'rgba(99,102,241,0.2)'; });
      zone.addEventListener('dragleave', () => { zone.style.background = ''; });
      zone.addEventListener('drop', e => {
        e.preventDefault(); e.stopPropagation();
        zone.style.background = '';
        const f = e.dataTransfer.files[0];
        if (!f) return;
        fileInp.files = e.dataTransfer.files;
        fileInp.dispatchEvent(new Event('change'));
      });

      body.append(zone, fileInp);
      return;
    }

    // Header bar
    const header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(0,0,0,0.3);flex-shrink:0;font-size:11.5px;';
    header.innerHTML = '<span style="opacity:0.6">📄</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + file.name + '</span>';
    const changeBtn = document.createElement('button');
    changeBtn.textContent = '↺ Andere Datei';
    changeBtn.style.cssText = 'border:none;background:rgba(255,255,255,0.1);color:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:10.5px;flex-shrink:0';
    changeBtn.addEventListener('click', e => { e.stopPropagation(); w.config.fileData = null; APP.save(); renderWidgetContent(w, body); });
    header.appendChild(changeBtn);

    const viewer = document.createElement('div');
    viewer.style.cssText = 'flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;background:#000;';

    if (file.type.startsWith('image/')) {
      const img = document.createElement('img');
      img.src = file.data;
      img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain';
      viewer.appendChild(img);
    } else if (file.type === 'application/pdf') {
      const frame = document.createElement('iframe');
      frame.src = file.data;
      frame.style.cssText = 'width:100%;height:100%;border:none;';
      viewer.appendChild(frame);
    } else if (file.type.startsWith('video/')) {
      const vid = document.createElement('video');
      vid.src = file.data; vid.controls = true;
      vid.style.cssText = 'max-width:100%;max-height:100%';
      viewer.appendChild(vid);
    } else if (file.type.startsWith('audio/')) {
      const aud = document.createElement('audio');
      aud.src = file.data; aud.controls = true;
      aud.style.cssText = 'width:90%;margin:auto';
      viewer.appendChild(aud);

  // ── Dice ──
  dice(w, body) {
    const FACES = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
    body.style.flexDirection = 'column'; body.style.gap = '8px';
    const d = el('div','w-dice');
    d.style.fontSize = Math.max(40, Math.min(w.w * 0.65, w.h * 0.68)) + 'px';
    d.textContent = FACES[w.config.value || 1];
    d.title = 'Klicken zum Würfeln';
    const hint = el('div'); hint.style.cssText='font-size:11px;color:rgba(255,255,255,0.35)';
    hint.textContent = 'Klicken zum Würfeln';
    d.addEventListener('click', () => {
      let count = 0;
      const roll = setInterval(() => {
        const v = Math.ceil(Math.random()*6);
        d.textContent = FACES[v];
        if (++count >= 10) { clearInterval(roll); w.config.value = v; APP.save(); }
      }, 60);
    });
    body.append(d, hint);
  },

  // ── Random Number ──
  randomnum(w, body) {
    body.style.flexDirection = 'column'; body.style.gap = '8px';
    const display = el('div','w-randnum');
    display.style.fontSize = Math.max(32, Math.min(w.w * 0.52, w.h * 0.58)) + 'px';
    display.textContent = w.config.value ?? '?';
    const info = el('div'); info.style.cssText='font-size:11px;color:rgba(255,255,255,0.35)';
    info.textContent = `${w.config.min||1} – ${w.config.max||30}`;
    display.addEventListener('click', () => {
      const v = Math.floor(Math.random()*(((w.config.max||30)-(w.config.min||1))+1)) + (w.config.min||1);
      display.textContent = v;
      w.config.value = v;
      APP.save();
    });
    body.append(display, info);
  },

  // ── Groups ──
  groups(w, body) {
    const names = (w.config.names||'').split('\n').map(s=>s.trim()).filter(Boolean);
    const size = Math.max(1, w.config.size || 3);
    const shuffled = [...names].sort(()=>Math.random()-0.5);
    const grps = [];
    for (let i=0; i<shuffled.length; i+=size) grps.push(shuffled.slice(i,i+size));

    // Adaptive font: fill available space so names are readable from the back of the class
    const numGroups = Math.max(1, grps.length);
    const maxPerGroup = Math.max(1, Math.max(...grps.map(g => g.length)));
    // Available height: subtract btn (~36px) and header row (~1.4em per group-header)
    const headerPx = Math.max(14, w.h * 0.06);
    const availH = w.h - 44; // subtract shuffle-btn row
    // Each group card: header + names. Fit header + names into availH.
    // nameSz: fill height → availH / (maxPerGroup + 1.2 for header)
    const nameSzByH = availH / (maxPerGroup + 1.2);
    // nameSz: don't overflow width → (w.w / numGroups - 24) / ~5 chars avg
    const nameSzByW = (w.w / numGroups - 24) / 5.5;
    const nameSz = Math.max(16, Math.min(nameSzByH, nameSzByW, 120));
    const headSz = Math.max(12, nameSz * 0.42);

    const inner = el('div','groups-inner');
    const btn = el('button','w-action-btn'); btn.textContent = '🔀 Neu mischen'; btn.style.cssText='margin:0 auto 6px;display:block;flex-shrink:0';
    btn.addEventListener('click', () => renderWidgetContent(w, body));

    grps.forEach((g,i) => {
      const card = el('div','group-card');
      card.style.flex = '1';
      const h4 = document.createElement('h4');
      h4.style.fontSize = headSz + 'px';
      h4.style.marginBottom = Math.max(2, headSz * 0.3) + 'px';
      h4.textContent = 'Gruppe ' + (i+1);
      const ul = document.createElement('ul');
      ul.style.listStyle = 'none';
      ul.style.padding = '0';
      g.forEach(n => {
        const li=document.createElement('li');
        li.style.fontSize = nameSz + 'px';
        li.style.lineHeight = '1.15';
        li.style.fontWeight = '600';
        li.style.padding = '0';
        li.textContent=n;
        ul.appendChild(li);
      });
      card.append(h4, ul);
      inner.appendChild(card);
    });
    body.append(btn, inner);
  },

  // ── Agenda ──
  agenda(w, body) {
    const inner = el('div','agenda-inner');
    (w.config.items || []).forEach(item => {
      const row = el('div','agenda-item');
      const time = el('div','agenda-time'); time.textContent = item.time || '';
      const text = el('div','agenda-text'); text.textContent = item.text || '';

      inner.appendChild(row);
    });
    if (!(w.config.items||[]).length) {
      const hint = el('div'); hint.style.cssText='font-size:12px;color:rgba(255,255,255,0.3);padding:12px';
      hint.textContent = 'Agenda eintragen (⚙ Einstellungen)';
      inner.appendChild(hint);
    }
    if (APP.state.editMode) inner.addEventListener('dblclick', () => openAgendaEdit(w));
    body.appendChild(inner);
  },

  // ── Checklist ──
  checklist(w, body) {
    const inner = el('div','checklist-inner');
    const items = w.config.items || [];
    function renderItems() {
      inner.innerHTML = '';
      items.forEach((item, i) => {
        const row = el('div','checklist-item' + (item.done?' done':''));
        const cb = el('input'); cb.type='checkbox'; cb.checked=!!item.done;
        cb.addEventListener('change', () => {
          item.done = cb.checked;
          row.classList.toggle('done', item.done);
          APP.save();
        });
        const span = el('span'); span.textContent = item.text || '';
        row.append(cb, span);
        inner.appendChild(row);
      });
    }
    renderItems();
    if (APP.state.editMode) inner.addEventListener('dblclick', e => {
      if (e.target.tagName !== 'INPUT') openChecklistEdit(w, renderItems);
    });
    body.appendChild(inner);
  },

  // ── Phases ──
  phases(w, body) {
    const phases = w.config.phases || [];
    let activeIdx = w.config.activeIdx ?? -1;
    const inner = el('div','phases-inner');
    const items = [];

    phases.forEach((p, i) => {
      const row = el('div','phase-item');
      if (i === activeIdx) row.classList.add('active');
      row.style.background = p.color + '22';
      const dot = el('div','phase-dot'); dot.style.background = p.color;
      const name = el('div','phase-name'); name.textContent = p.name;
      const dur = el('div','phase-dur'); dur.textContent = p.minutes + ' min';
      row.append(dot, name, dur);
      row.addEventListener('click', () => {
        activeIdx = i;
        w.config.activeIdx = i;
        APP.save();
        items.forEach((r,j) => r.classList.toggle('active', j===i));
      });
      inner.appendChild(row);
      items.push(row);
    });
    body.appendChild(inner);
  },

  // ── Status ──
  status(w, body) {
    const STATUSES = [
      { emoji:'😕', label:'Ich brauche Hilfe', color:'#ef4444' },
      { emoji:'🤔', label:'Ich denke nach', color:'#f59e0b' },
      { emoji:'🙂', label:'Alles okay', color:'#22c55e' },
      { emoji:'😄', label:'Ich bin fertig!', color:'#6366f1' },
    ];
    let idx = w.config.statusIdx ?? 2;
    const inner = el('div','status-inner');
    const emojiEl = el('div','status-emoji');
    const labelEl = el('div','status-label');

    function update() {
      const s = STATUSES[idx];
      emojiEl.textContent = s.emoji;
      labelEl.textContent = s.label;
      inner.style.background = s.color + '22';
    }
    emojiEl.addEventListener('click', () => {
      idx = (idx+1) % STATUSES.length;
      w.config.statusIdx = idx;
      APP.save();
      update();
    });
    inner.append(emojiEl, labelEl);
    body.appendChild(inner);
    update();
  },
};
